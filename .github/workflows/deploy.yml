name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Daily refresh so the selectable dates stay current (source updates ~monthly).
    - cron: '30 18 * * *'
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Requires Pages to be enabled with "GitHub Actions" as the source
      # (Settings -> Pages). We don't auto-enable, as the default token isn't
      # permitted to create the Pages site.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: false

      - name: Install dependencies
        run: npm ci

      # On scheduled / manual runs, regenerate the open data so recent dates
      # stay fresh. Best-effort: if the API is unavailable, the committed data
      # is used and the deploy still succeeds. Skipped on push (uses committed data).
      - name: Refresh open data (best effort)
        if: github.event_name != 'push'
        run: npm run fetch-data
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
